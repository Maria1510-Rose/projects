<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Layout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        header {
            background: #333;
            color: #fff;
            padding: 20px 0;
            text-align: center;
        }
        .main-content {
            display: flex;
            margin-top: 20px;
        }
        .blog-posts {
            flex: 2;
            background: #fff;
            padding: 20px;
            margin-right: 20px;
            border-radius: 5px;
        }
        .sidebar {
            flex: 1;
            background: #fff;
            padding: 20px;
            border-radius: 5px;
        }
        .blog-post {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }
        footer {
            background: #333;
            color: #fff;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Blog</h1>
    </header>
    
    <div class="container">
        <div class="main-content">
            <div class="blog-posts">
                <div class="blog-post">
                    <h2>Blog Post Title 1</h2>
                </div>
                <div class="blog-post">
                    <h2>Blog Post Title 2</h2>
                </div>
            </div>
            <aside class="sidebar">
                <h3>About Me</h3>
                <p>Short bio or description here.</p>
                <h3>Categories</h3>
                <ul>
                    <li>Technology</li>
                    <li>Lifestyle</li>
                    <li>Travel</li>
                </ul>
            </aside>
        </div>
    </div>
    
    <footer>
        <p>&copy; 2025 My Blog. All rights reserved.</p>
    </footer>
</body>
</html>
